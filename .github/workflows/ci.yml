name: CI

# Runs on every pull request to main. This is the required gate before merge.
#
# It is deliberately LEAN: static checks only — lint, type-check, the workflow
# policy guard, and the content validators that read docs/ source. It does NOT
# run the test suite, does NOT build the site, and does NOT run anything that
# inspects built HTML or drives a browser. Per the civic-app consistency
# standard (patapsco/docs/app-consistency-standard.md, §4), the hosted lane is
# static checks, contracts, and security only.
#
# The test suite, the strict MkDocs build, the built-site link crawl, and the
# accessibility checks all still run — in the pre-push hook and the pre-deploy
# gate (.github/workflows/deploy.yml), via './scripts/verify.sh --plan prepush'.
# Nothing was dropped; it moved to the tier that can afford it.
#
# This job runs `task ci` verbatim, so the hosted lane and a local run are the
# same command. Do not add a test, build, or browser step here, and do not add
# one to a task `ci` reaches: scripts/check_hosted_ci_policy.py resolves the
# Taskfile graph and verify.py's plans transitively and fails this job if a
# forbidden command becomes reachable at any depth. The `ci` plan additionally
# runs Patapsco's platform-check for the shared estate baseline.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Static checks
    runs-on: ubuntu-latest
    # The whole lean plan runs in seconds. Ten minutes is pure headroom, and it
    # means a hung step fails fast instead of sitting on GitHub's six-hour
    # default. scripts/verify.py additionally bounds each individual step.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"

      - uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v2
        with:
          version: 3.49.1

      # The two network steps get their own tighter caps: a wedged package
      # index is the one thing here that can hang without any local symptom.
      - name: Install uv
        timeout-minutes: 5
        run: pip install uv==0.11.28

      - name: Install dependencies
        timeout-minutes: 5
        run: uv sync --frozen

      # `task ci` is the whole gate. Its steps live in Taskfile.yml and
      # scripts/verify.py, so a local run, this workflow, and the deploy gate
      # cannot drift apart. Never list an ad-hoc check step here.
      - name: Run the lean gate
        timeout-minutes: 5
        run: task ci
