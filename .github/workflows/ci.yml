name: CI

# Runs on every pull request to main. This is the required gate before merge.
# It runs the same scripts/verify.py suite maintainers run locally: lint,
# tests, validators, strict build, built-site link crawl, and a11y smoke.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv==0.11.28

      - name: Install dependencies
        run: uv sync --frozen

      # scripts/verify.py is the single source of truth for the check suite.
      # Do not add ad-hoc check steps here — add them to build_steps() so
      # local runs, CI, and the deploy gate can never drift apart.
      - name: Run verification suite
        run: uv run python scripts/verify.py
