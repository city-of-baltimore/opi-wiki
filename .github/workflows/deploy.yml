name: Deploy to GitHub Pages

# Builds and deploys the site to GitHub Pages on every push to main (i.e. after a
# PR merges). The committed site_url stays pointed at the custom domain for the
# fly.io build; the Pages base URL is set only inside this CI run.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install poetry==2.4.1
          poetry install --no-interaction --no-ansi

      - name: Point base URL at the Pages subpath (CI only)
        run: |
          sed -i 's#^site_url:.*#site_url: https://city-of-baltimore.github.io/opi-wiki/#' mkdocs.yml

      - name: Build (strict)
        run: poetry run mkdocs build --strict

      - name: Check built-site internal links (catches card/HTML hrefs strict misses)
        run: poetry run python scripts/check_built_links.py site

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
