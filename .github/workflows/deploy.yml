name: Deploy to GitHub Pages

# Builds and deploys the site to GitHub Pages on every push to main. The full
# scripts/verify.py suite gates the deploy, so a direct-to-main commit gets the
# same checks as a PR. The committed site_url defaults to the future custom
# domain; OPI_SITE_URL (read via !ENV in mkdocs.yml) points this build at the
# Pages base URL without rewriting any tracked file.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv==0.11.28

      - name: Install dependencies
        run: uv sync --frozen

      # scripts/verify.py is the single source of truth for the check suite;
      # its strict-build step produces the site/ artifact uploaded below.
      - name: Run verification suite (gates the deploy, builds site/)
        env:
          OPI_SITE_URL: https://city-of-baltimore.github.io/opi-wiki/
        run: uv run python scripts/verify.py

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
