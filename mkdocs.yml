site_name: OPI Foundations
site_description: How the Mayor's Office of Performance and Innovation works — the public reference for OPI's operating model, methodology, and strategy.
site_url: https://opi.baltimorecity.gov/
site_author: Mayor's Office of Performance and Innovation, City of Baltimore
copyright: © Mayor's Office of Performance and Innovation, City of Baltimore

repo_name: city-of-baltimore/opi-wiki
repo_url: https://github.com/city-of-baltimore/opi-wiki
edit_uri: edit/main/docs/
docs_dir: docs
strict: true

# Keep global site/runtime config here.
# Own section navigation locally in docs/**/.pages.

theme:
  name: material
  custom_dir: overrides
  language: en
  font:
    text: Nunito Sans
    code: Roboto Mono
  logo: assets/images/city-of-baltimore-logo.png
  favicon: assets/images/favicon.ico
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    annotation: material/star-four-points-circle

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.action.edit
    - content.action.view
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - announce.dismiss

extra_css:
  - assets/stylesheets/fonts.css
  - assets/stylesheets/tokens.css
  - assets/stylesheets/base.css
  - assets/stylesheets/material-chrome.css
  - assets/stylesheets/components.css
  - assets/stylesheets/home.css

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/city-of-baltimore/opi-wiki
      name: OPI Foundations on GitHub
  status:
    new: Recently added
    deprecated: Deprecated

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link to this section
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

