# Canonical people directory for OPI Foundations.
#
# Single source of truth for staff and contractors. Populates the org chart,
# the team roster, the position-description index, and inline role references —
# via the shared macros in main.py / scripts/repo_tools/people.py. Update a
# person here and every surface across the wiki updates.
#
# Per-person fields: name, title (working title), worker_type (staff |
# contractor | offshore-contractor), status (filled | open), cost_center,
# classification, reports_to, pin, email, phone, location, pd (path under
# resources/reference/position-descriptions/, or omit for roles without a PD).
# Contractors carry no pin and no pd.

