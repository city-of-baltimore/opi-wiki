# Public organization data for OPI Foundations.
#
# Single source for the public org chart and the Team and Roles table. It holds
# only information OPI publishes about its structure: names, working titles,
# team labels and leads, each team's high-level purpose, and a one-line public
# summary of what each role does. City staff appear here; contractors do not.
#
# Personal or employment data must never be added: payroll identifiers, phone
# numbers, email addresses, classifications, cost centers, personnel status, and
# full position descriptions live in City systems or SharePoint. The people-data
# loader rejects `pin` and `phone` keys as an additional publication safeguard.
#
# Open (unfilled) City roles use the name "Open" so they show in the structure
# without implying a current incumbent.

city_administrator:
  name: Faith P. Leach
  title: City Administrator

executive_director:
  name: Dartanion Swift-Williams
  title: Executive Director and Chief Data Officer
  summary: Sets OPI's strategy, standards, and priorities, and leads the City's performance, data, innovation, and cross-agency delivery agenda.

