# Public organization data for OPI Foundations.
#
# This file contains only the information rendered on the public leadership
# chart: names and titles for City leadership, team labels, team leads, and
# each team's high-level purpose. Staff rosters, contractor details, payroll
# identifiers, phone numbers, email addresses, classifications, personnel
# status, cost centers, and full position descriptions belong in City systems
# or SharePoint and must not be added here. The people-data loader rejects
# legacy `pin` and `phone` keys as an additional publication safeguard.

city_administrator:
  name: Faith P. Leach
  title: City Administrator

executive_director:
  name: Dartanion Swift-Williams
  title: Executive Director and Chief Data Officer

portfolios:
  - key: directors-office
    label: Director's Office
    node_id: DO
    primary_value: Operating backbone that keeps work prioritized, documented, communicated, and deliverable.
    table_lead: Rakeim Young, Chief of Staff
    lead:
      name: Rakeim Young
      title: Chief of Staff

  - key: performance
    label: Performance
    node_id: PC
    primary_value: Owns the performance method; translates priorities into routines, measures, follow-up, and improvement.
    table_lead: Danny Heller, Deputy Chief Performance Officer
    lead:
      name: Danny Heller
      title: Deputy Chief Performance Officer

  - key: data-and-analytics
    label: Data and Analytics
    node_id: DA
    primary_value: Builds trusted data infrastructure and decision-ready analytics; supports CitiStat, transparency, agency operations, and AI readiness.
    table_lead: Jason Howard, PhD, Deputy Chief Data Officer
    lead:
      name: "Jason Howard, PhD"
      title: Deputy Chief Data Officer

  - key: innovation-lab
    label: Innovation Lab
    node_id: IL
    primary_value: Turns service problems into designed, usable, testable solutions; coordinates handoff to data, engineering, agency, or BCIT partners.
    table_lead: Gabriel Watson, Innovation Program Manager
    lead:
      name: Gabriel Watson
      title: Innovation Program Manager
